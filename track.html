<!DOCTYPE html>
<html>
<head>

<title>Bus Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
  height: 500px;
}
</style>

</head>

<body>

<h2>🗺️ Live Bus Tracking</h2>

<p id="eta">ETA: calculating...</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([0, 0], 2);

L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 20,
  subdomains: ['mt0','mt1','mt2','mt3']
}).addTo(map);

var busIcon = L.icon({
  iconUrl: 'bus.png',
  iconSize: [40, 40],
});

var marker;
let polyline = L.polyline([], {color: 'blue'}).addTo(map);

// ✅ DESTINATION
let destination = [12.9716, 77.5946];

// ✅ Smooth movement
function smoothMove(marker, newLatLng) {
  let current = marker.getLatLng();

  let steps = 20;
  let i = 0;

  let deltaLat = (newLatLng[0] - current.lat) / steps;
  let deltaLng = (newLatLng[1] - current.lng) / steps;

  let interval = setInterval(() => {
    if (i >= steps) {
      clearInterval(interval);
      return;
    }

    current.lat += deltaLat;
    current.lng += deltaLng;

    marker.setLatLng([current.lat, current.lng]);
    i++;
  }, 50);
}

// ✅ Distance function
function getDistance(p1, p2) {
  let R = 6371;

  let dLat = (p2[0] - p1[0]) * Math.PI / 180;
  let dLng = (p2[1] - p1[1]) * Math.PI / 180;

  let a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(p1[0]*Math.PI/180) * Math.cos(p2[0]*Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c * 1000;
}

// ✅ OSRM ROUTE FUNCTION
async function getRoute(start, end) {
  let url = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;

  let res = await fetch(url);
  let data = await res.json();

  let coords = data.routes[0].geometry.coordinates;

  return coords.map(c => [c[1], c[0]]);
}

// get location every 1 sec
setInterval(async ()=>{

  try {

    const res = await fetch("https://bus-tracker-6cmi.onrender.com/get-location")
    const data = await res.json();

    if (data.lat === 0 && data.lng === 0) return;

    let newPoint = [data.lat, data.lng];

    // ✅ FILTER GPS JUMPS
    if (marker) {
      let current = marker.getLatLng();
      let dist = getDistance([current.lat, current.lng], newPoint);

      if (dist > 50) {
        console.log("Ignored jump:", dist);
        return;
      }
    }

    if (!marker) {
      marker = L.marker(newPoint, { icon: busIcon }).addTo(map).bindPopup("Bus");
    } else {
      smoothMove(marker, newPoint);
    }

    map.setView(newPoint, 15);

    // ✅ REAL ROAD PATH (OSRM)
    if (marker) {
      let current = marker.getLatLng();

      let roadPath = await getRoute(
        [current.lat, current.lng],
        newPoint
      );

      polyline.setLatLngs(roadPath);
    }

    // ✅ ETA (still basic)
    if (marker) {
      let current = marker.getLatLng();

      let dist = getDistance(
        [current.lat, current.lng],
        destination
      );

      let speed = 10;

      let eta = dist / speed;

      let minutes = (eta / 60).toFixed(1);

      document.getElementById("eta").innerText =
        "ETA to destination: " + minutes + " min";
    }

  } catch (err){
    console.log("Error:", err);
  }

},1000);

</script>

</body>
</html>
