<!DOCTYPE html>
<html>
<head>

<title>Bus Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
  height: 500px;
}
</style>

</head>

<body>

<h2>🗺️ Live Bus Tracking</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([0, 0], 2);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var busIcon = L.icon({
  iconUrl: 'bus.png',
  iconSize: [40, 40],
});

var marker;
let route = [];
let polyline = L.polyline(route, {color: 'blue'}).addTo(map);

// ✅ ADD THIS FUNCTION
function smoothMove(marker, newLatLng) {
  let current = marker.getLatLng();

  let steps = 20;
  let i = 0;

  let deltaLat = (newLatLng[0] - current.lat) / steps;
  let deltaLng = (newLatLng[1] - current.lng) / steps;

  let interval = setInterval(() => {
    if (i >= steps) {
      clearInterval(interval);
      return;
    }

    current.lat += deltaLat;
    current.lng += deltaLng;

    marker.setLatLng([current.lat, current.lng]);
    i++;
  }, 50);
}

// get location from server every 2 sec
setInterval(async ()=>{

  try {

    const res = await fetch("https://bus-tracker-6cmi.onrender.com/get-location")
    const data = await res.json();

    if (data.lat === 0 && data.lng === 0) return;

    let newPoint = [data.lat, data.lng];

    if (!marker) {
      marker = L.marker(newPoint, { icon: busIcon }).addTo(map).bindPopup("Bus");
    } else {
      // ❌ OLD: marker.setLatLng(newPoint);
      // ✅ NEW:
      smoothMove(marker, newPoint);
    }

    map.setView(newPoint, 15);

    route.push(newPoint);
    polyline.setLatLngs(route);

  } catch (err){
    console.log("Error:", err);
  }

},2000);

</script>

</body>
</html>
