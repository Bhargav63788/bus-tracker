<!DOCTYPE html>
<html>
<head>

<title>Bus Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
  height: 500px;
}
</style>

</head>

<body>

<h2>🗺️ Live Bus Tracking</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([0, 0], 2);

L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 20,
  subdomains: ['mt0','mt1','mt2','mt3']
}).addTo(map);

var busIcon = L.icon({
  iconUrl: 'bus.png',
  iconSize: [40, 40],
});

var marker;
let route = [];
let polyline = L.polyline(route, {color: 'blue'}).addTo(map);

// ✅ Smooth movement
function smoothMove(marker, newLatLng) {
  let current = marker.getLatLng();

  let steps = 20;
  let i = 0;

  let deltaLat = (newLatLng[0] - current.lat) / steps;
  let deltaLng = (newLatLng[1] - current.lng) / steps;

  let interval = setInterval(() => {
    if (i >= steps) {
      clearInterval(interval);
      return;
    }

    current.lat += deltaLat;
    current.lng += deltaLng;

    marker.setLatLng([current.lat, current.lng]);
    i++;
  }, 50);
}

// ✅ Distance filter function (NEW)
function getDistance(p1, p2) {
  let R = 6371;

  let dLat = (p2[0] - p1[0]) * Math.PI / 180;
  let dLng = (p2[1] - p1[1]) * Math.PI / 180;

  let a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(p1[0]*Math.PI/180) * Math.cos(p2[0]*Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c * 1000; // meters
}

// get location from server every 2 sec
setInterval(async ()=>{

  try {

    const res = await fetch("https://bus-tracker-6cmi.onrender.com/get-location")
    const data = await res.json();

    if (data.lat === 0 && data.lng === 0) return;

    let newPoint = [data.lat, data.lng];

    // ✅ FILTER BAD GPS JUMPS
    if (marker) {
      let current = marker.getLatLng();
      let dist = getDistance([current.lat, current.lng], newPoint);

      if (dist > 50) {
        console.log("Ignored jump:", dist);
        return;
      }
    }

    if (!marker) {
      marker = L.marker(newPoint, { icon: busIcon }).addTo(map).bindPopup("Bus");
    } else {
      smoothMove(marker, newPoint);
    }

    map.setView(newPoint, 15);

    route.push(newPoint);
    polyline.setLatLngs(route);

  } catch (err){
    console.log("Error:", err);
  }

},2000);

</script>

</body>
</html>
